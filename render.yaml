services:
  - type: web
    name: interior-ai
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /
    envVars:
      - key: ARK_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ARK_IMAGE_MODEL
        value: doubao-seedream-5-0-260128
      - key: CREEM_API_KEY
        sync: false
      - key: CREEM_WEBHOOK_SECRET
        sync: false
      - key: CREEM_API_BASE
        value: https://api.creem.io/v1
      - key: CREEM_PRODUCT_C10
        sync: false
      - key: CREEM_PRODUCT_C50
        sync: false
      - key: CREEM_PRODUCT_C200
        sync: false
      - key: CREEM_PRODUCT_C500
        sync: false
      - key: DOMAIN
        sync: false
      - key: PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_BASE_URL
        sync: false
      - key: APP_DATA_ROOT
        value: /var/data
      - key: DATABASE_URL
        fromDatabase:
          name: interior-ai-db
          property: connectionString
      - key: APP_ENV
        value: production

databases:
  - name: interior-ai-db
    plan: free
    databaseName: interior_ai
    user: interior_ai_user
